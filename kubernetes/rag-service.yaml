apiVersion: v1
kind: Service
metadata:
  name: rag-service
  labels:
    app: rag-agent
spec:
  type: NodePort
  selector:
    app: rag-agent
  ports:
    - protocol: TCP
      port: 80          # The port inside the cluster
      targetPort: 80    # The port NGINX is listening on inside the Pod
      nodePort: 30080   # The dedicated port to access from your local machine browser